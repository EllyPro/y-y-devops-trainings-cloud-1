name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Login to YandexCloudRegistry
      run: |
        echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" > key.json
        cat key.json | docker login \
          --username json_key \
          --password-stdin cr.yandex
    - name: Build Image
      run: |
        docker build -t catgpt .
    - name: Tag Image
      run: |
        docker tag catgpt cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
    - name: Push Image
      run: |
        docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
      
