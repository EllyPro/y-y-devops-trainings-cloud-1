name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Login to YandexCloudRegistry
      run: |
        printf '%s' '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > key.json
        docker login \
          --username json_key \
          --password-stdin cr.yandex < key.json
    - name: Build Image
      run: |
        docker build -t catgpt .
    - name: Tag Image
      run: |
        docker tag catgpt cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
    - name: Push Image
      run: |
        docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        scripts: |
          docker stop catgpt
          docker rm catgpt
          docker pull cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
          docker run -d --name catgpt --network host cr.yandex/${{ secrets.YC_REGISTRY_ID }}/catgpt:latest
      
